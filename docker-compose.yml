services:
  mongo:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_NUM_PARALLEL=1
    volumes:
      - ollama_data:/root/.ollama

  nl2mongo-api:
    build: .
    ports:
      - "5100:5100"
    environment:
      - ASPNETCORE_URLS=http://+:5100
      - ConnectionStrings__MongoDB=mongodb://mongo:27017
      - OllamaBaseUrl=${OllamaBaseUrl:-http://host.docker.internal:11434}
      - OllamaModel=${OllamaModel:-llama3.1:8b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongo

volumes:
  mongo_data:
  ollama_data:
